name: Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate top metrics
        uses: ./.github/actions/generate-metrics
        with:
          token: ${{ secrets.METRICS_SECRET }}
          filename: metrics.top.svg
          template: terminal

      - name: Generate left metrics (anilist)
        uses: ./.github/actions/generate-metrics
        with:
          token: NOT_NEEDED
          filename: metrics.left.svg
          base: ""
          plugin_anilist: yes
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: watching
          plugin_anilist_limit: 2
          plugin_anilist_shuffle: yes
          plugin_anilist_user: .user.login

      - name: Generate right metrics (music)
        uses: ./.github/actions/generate-metrics
        with:
          token: NOT_NEEDED
          filename: metrics.right.svg
          base: ""
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_limit: 4
          plugin_music_played_at: yes
          plugin_music_token: "${{ secrets.SPOTIFY_CLIENT_ID }}, ${{ secrets.SPOTIFY_CLIENT_SECRET }}, ${{ secrets.SPOTIFY_REFRESH_TOKEN }}"

      - name: Generate bottom metrics (activity)
        uses: ./.github/actions/generate-metrics
        with:
          token: ${{ secrets.METRICS_SECRET }}
          filename: metrics.bottom.svg
          base: ""
          plugin_isocalendar: yes
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
