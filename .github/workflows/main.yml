name: Metrics
on:
  # Schedule updates (each hour)
  schedule: [{cron: "0 * * * *"}]
  # Lines below let you run workflow manually and on each commit (optional)
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # Each metrics step uses continue-on-error so that independent steps
      # are not blocked by a single failure. The final "Check outcomes" step
      # propagates any failure so errors are never silently swallowed.

      - name: Generate metrics.top.svg
        id: metrics_top
        if: ${{ secrets.METRICS_SECRET != '' }}
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_SECRET }}
          filename: metrics.top.svg
          config_twemoji: yes
          use_prebuilt_image: yes
          config_display: column
          template: terminal

      - name: Generate metrics.left.svg (AniList)
        id: metrics_left
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          token: NOT_NEEDED
          filename: metrics.left.svg
          base: ""
          config_twemoji: yes
          use_prebuilt_image: yes
          config_display: column
          plugin_anilist: yes
          plugin_anilist_medias: anime, manga             # Display both animes and mangas
          plugin_anilist_sections: watching  # Display only favorites and characters sections
          plugin_anilist_limit: 2                         # Limit to 2 entry per section (characters section excluded)
          plugin_anilist_shuffle: yes                     # Shuffle data for more varied outputs
          plugin_anilist_user: .user.login

      - name: Generate metrics.right.svg (Spotify)
        id: metrics_right
        if: ${{ secrets.SPOTIFY_CLIENT_ID != '' && secrets.SPOTIFY_CLIENT_SECRET != '' && secrets.SPOTIFY_REFRESH_TOKEN != '' }}
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          token: NOT_NEEDED
          filename: metrics.right.svg
          base: ""
          config_twemoji: yes
          use_prebuilt_image: yes
          config_display: column
          plugin_music: yes
          plugin_music_provider: spotify # Use Spotify as provider
          plugin_music_mode: recent      # Set plugin mode
          plugin_music_limit: 4          # Limit to 4 entries
          plugin_music_played_at: yes    # Show timestamp (for spotify only)
          plugin_music_token: "${{ secrets.SPOTIFY_CLIENT_ID }}, ${{ secrets.SPOTIFY_CLIENT_SECRET }}, ${{ secrets.SPOTIFY_REFRESH_TOKEN }}"

      - name: Generate metrics.bottom.svg
        id: metrics_bottom
        if: ${{ secrets.METRICS_SECRET != '' }}
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_SECRET }}
          filename: metrics.bottom.svg
          base: ""
          config_twemoji: yes
          use_prebuilt_image: yes
          config_display: column
          plugin_isocalendar: yes
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage

      - name: Check outcomes
        if: always()
        run: |
          failed=""

          if [ "${{ steps.metrics_top.outcome }}" = "failure" ]; then
            echo "::error::metrics.top.svg generation failed"
            failed="true"
          elif [ "${{ steps.metrics_top.outcome }}" = "skipped" ]; then
            echo "::warning::metrics.top.svg was skipped — METRICS_SECRET may not be configured"
          fi

          if [ "${{ steps.metrics_left.outcome }}" = "failure" ]; then
            echo "::error::metrics.left.svg (AniList) generation failed"
            failed="true"
          fi

          if [ "${{ steps.metrics_right.outcome }}" = "failure" ]; then
            echo "::error::metrics.right.svg (Spotify) generation failed"
            failed="true"
          elif [ "${{ steps.metrics_right.outcome }}" = "skipped" ]; then
            echo "::warning::metrics.right.svg was skipped — Spotify secrets may not be configured"
          fi

          if [ "${{ steps.metrics_bottom.outcome }}" = "failure" ]; then
            echo "::error::metrics.bottom.svg generation failed"
            failed="true"
          elif [ "${{ steps.metrics_bottom.outcome }}" = "skipped" ]; then
            echo "::warning::metrics.bottom.svg was skipped — METRICS_SECRET may not be configured"
          fi

          if [ -n "$failed" ]; then
            echo "::error::One or more metrics steps failed — see above for details"
            exit 1
          fi

          echo "All metrics steps completed successfully"


